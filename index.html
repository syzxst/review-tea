<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>评价</title>
<style>
body{padding:20px;}
.star{font-size:24px;cursor:pointer;}
.active{color:gold;}
textarea{width:100%;height:100px;margin-top:10px;}
button{margin-top:10px;padding:10px 20px;}
</style>
</head>
<body>

<h3>请评价</h3>
<div>
<span class="star" onclick="set(1)">★</span>
<span class="star" onclick="set(2)">★</span>
<span class="star" onclick="set(3)">★</span>
<span class="star" onclick="set(4)">★</span>
<span class="star" onclick="set(5)">★</span>
</div>

<textarea id="msg" placeholder="写评价..."></textarea>
<br>
<button onclick="ok()">提交评价</button>

<div id="result" style="margin-top:20px;color:green"></div>

<script>
var score = 0;

function set(n){
    score = n;
    var list = document.querySelectorAll('.star');
    for(var i=0;i<5;i++){
        list[i].className = i < n ? 'star active' : 'star';
    }
}

function ok(){
    var text = document.getElementById('msg').value;
    if(score == 0){
        alert('请打分');
        return;
    }
    if(text == ''){
        alert('请写评价');
        return;
    }
    var res = "分数："+score+"星\n内容："+text;
    document.getElementById('result').innerText = res;
    alert("提交成功！\n\n"+res);
}
</script>

</body>
</html>
